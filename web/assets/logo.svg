<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1d23" />
      <stop offset="100%" stop-color="#1e3a44" />
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#57d2b5" />
      <stop offset="50%" stop-color="#6ab7ff" />
      <stop offset="100%" stop-color="#ff8fb1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-hard" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Plate -->
  <rect width="400" height="400" rx="90" fill="url(#bg-grad)" stroke="rgba(106,183,255,0.2)" stroke-width="4"/>

  <!-- Orbit Tracks -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(106, 183, 255, 0.15)" stroke-width="4" stroke-dasharray="10 12" />
  <circle cx="200" cy="200" r="95" fill="none" stroke="rgba(87, 210, 181, 0.15)" stroke-width="2" stroke-dasharray="4 6" />

  <!-- Agent Nodes -->
  <!-- Top node -->
  <circle cx="200" cy="60" r="15" fill="#57d2b5" filter="url(#glow-hard)" />
  <!-- Right node -->
  <circle cx="340" cy="200" r="15" fill="#6ab7ff" filter="url(#glow-hard)" />
  <!-- Bottom node -->
  <circle cx="200" cy="340" r="15" fill="#f7bf65" filter="url(#glow-hard)" />
  <!-- Left node -->
  <circle cx="60" cy="200" r="15" fill="#ff8fb1" filter="url(#glow-hard)" />

  <!-- Center Logo Shape (Magnifying Glass over Music Note) -->
  <g transform="translate(155, 145)">
    <!-- Music Note Head -->
    <circle cx="30" cy="70" r="14" fill="#dff9ff" filter="url(#glow-hard)"/>
    <!-- Note Stem & Flag -->
    <path d="M44 70 L44 15 Q60 10 75 35" fill="none" stroke="#dff9ff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-hard)" />

    <!-- Magnifying Glass Ring -->
    <circle cx="45" cy="45" r="50" fill="none" stroke="url(#beam)" stroke-width="14" stroke-linecap="round" />
    <!-- Glass Handle -->
    <line x1="82" y1="82" x2="115" y2="115" stroke="url(#beam)" stroke-width="18" stroke-linecap="round" stroke-linecap="round" />
  </g>
</svg>