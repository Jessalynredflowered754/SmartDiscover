<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" fill="none">
  <defs>
    <linearGradient id="gTrack" x1="100" y1="130" x2="860" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6BE1A6"/>
      <stop offset="1" stop-color="#FFC56E"/>
    </linearGradient>
    <filter id="fGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #101f19; }
      .frame { fill: #13261f; stroke: #3d6f58; stroke-opacity: .45; }
      .trackBase { stroke: #5f8f7b; stroke-opacity: .35; stroke-width: 6; stroke-linecap: round; }
      .trackGlow { stroke: url(#gTrack); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 10 12; animation: dash 2.1s linear infinite; }
      .node { fill: #193327; stroke: #6be1a6; stroke-opacity: .45; stroke-width: 2; }
      .nodePulse { fill: #6be1a6; fill-opacity: .12; animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .icon { stroke: #e9fff3; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { fill: #b9d9c9; font: 600 14px 'Segoe UI', sans-serif; }
      .packetA { fill: #6be1a6; filter: url(#fGlow); }
      .packetB { fill: #ffc56e; filter: url(#fGlow); animation-delay: .7s; }
      .orbit { stroke: #8fdcb5; stroke-opacity: .25; stroke-width: 1.5; stroke-dasharray: 2 8; animation: orbit 6s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -88; } }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: .5; } 50% { transform: scale(1.15); opacity: 1; } }
      @keyframes orbit { to { stroke-dashoffset: -120; } }
    </style>
  </defs>

  <rect class="bg" width="960" height="260" rx="20"/>
  <rect class="frame" x="8" y="8" width="944" height="244" rx="16"/>

  <path id="flowPath" class="trackBase" d="M120 132 H840"/>
  <path class="trackGlow" d="M120 132 H840"/>

  <circle class="orbit" cx="120" cy="132" r="44"/>
  <circle class="orbit" cx="360" cy="132" r="44"/>
  <circle class="orbit" cx="600" cy="132" r="44"/>
  <circle class="orbit" cx="840" cy="132" r="44"/>

  <g>
    <circle class="nodePulse" cx="120" cy="132" r="38"/>
    <circle class="node" cx="120" cy="132" r="33"/>
    <path class="icon" d="M108 122h24M108 132h24M108 142h14"/>
    <text class="label" x="120" y="198" text-anchor="middle">Profiler</text>
  </g>

  <g>
    <circle class="nodePulse" cx="360" cy="132" r="38" style="animation-delay:.35s"/>
    <circle class="node" cx="360" cy="132" r="33"/>
    <path class="icon" d="M347 142l8-8 8 6 14-16"/>
    <text class="label" x="360" y="198" text-anchor="middle">Search</text>
  </g>

  <g>
    <circle class="nodePulse" cx="600" cy="132" r="38" style="animation-delay:.7s"/>
    <circle class="node" cx="600" cy="132" r="33"/>
    <path class="icon" d="M588 144v-14M600 144v-22M612 144v-9"/>
    <text class="label" x="600" y="198" text-anchor="middle">Ranker</text>
  </g>

  <g>
    <circle class="nodePulse" cx="840" cy="132" r="38" style="animation-delay:1.05s"/>
    <circle class="node" cx="840" cy="132" r="33"/>
    <path class="icon" d="M828 126l12-10 12 10M828 138h24"/>
    <text class="label" x="840" y="198" text-anchor="middle">Presenter</text>
  </g>

  <circle class="packetA" r="6">
    <animateMotion dur="2.7s" repeatCount="indefinite" rotate="auto">
      <mpath href="#flowPath"/>
    </animateMotion>
  </circle>
  <circle class="packetB" r="5">
    <animateMotion dur="2.7s" repeatCount="indefinite" rotate="auto" begin="0.7s">
      <mpath href="#flowPath"/>
    </animateMotion>
  </circle>
</svg>
